<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Orange rounded background -->
  <rect width="100" height="100" rx="22" fill="#FF6B35"/>

  <!-- Camera body shape in white -->
  <rect x="18" y="38" width="64" height="38" rx="7" fill="white"/>

  <!-- Camera top nub -->
  <rect x="34" y="30" width="18" height="12" rx="4" fill="white"/>

  <!-- Camera lens: outer ring -->
  <circle cx="50" cy="57" r="13" fill="#FF6B35" stroke="white" stroke-width="3"/>

  <!-- Camera lens: inner dark -->
  <circle cx="50" cy="57" r="7" fill="#1a1a1a"/>

  <!-- Lens glare -->
  <circle cx="46" cy="53" r="2.5" fill="white" opacity="0.6"/>
</svg>
